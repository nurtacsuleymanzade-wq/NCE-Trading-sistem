function S(d,p){var r=[];for(var i=p-1;i<d.length;i++){var s=0;for(var j=0;j<p;j++)s+=d[i-j].c;r.push({time:d[i].time,value:s/p});}return r;}
function B(d,p,k){var m=S(d,p),u=[],l=[];for(var i=0;i<m.length;i++){var z=i+p-1,su=0;for(var j=0;j<p;j++)su+=Math.pow(d[z-j].c-m[i].value,2);var sd=Math.sqrt(su/p);u.push({time:m[i].time,value:m[i].value+k*sd});l.push({time:m[i].time,value:m[i].value-k*sd});}return{mid:m,upper:u,lower:l};}
function R(d,p){var r=[];for(var i=p;i<d.length;i++){var g=0,ls=0;for(var j=i-p+1;j<=i;j++){var ch=d[j].c-d[j-1].c;if(ch>0)g+=ch;else ls-=ch;}var ag=g/p,al=ls/p;if(al===0){r.push({time:d[i].time,value:100});continue;}r.push({time:d[i].time,value:100-100/(1+ag/al)});}return r;}
