<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOVA BTC</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:system-ui,sans-serif}
.h{background:#161b22;padding:8px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid #30363d}
.h h1{color:#e94560;font-size:14px}
#p{font-size:20px;font-weight:700}
.grn{color:#3fb950}.redd{color:#f85149}
.t{display:flex;gap:4px;margin-left:auto}
.t button{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px}
.t button.on{background:#1f6feb;border-color:#1f6feb;color:#fff}
.s{display:flex;gap:10px;font-size:10px;color:#8b949e;padding:4px 12px;background:#161b22;border-bottom:1px solid #30363d;flex-wrap:wrap}
.s span b{color:#c9d1d9}
#c{width:100%;height:calc(100vh - 80px)}
</style>
</head>
<body>
<div class="h">
  <h1>🐉 BTC</h1>
  <span id="p">--</span>
  <span id="c"></span>
  <div class="t" id="tf">
    <button data-m="1">1dk</button>
    <button data-m="5" class="on">5dk</button>
    <button data-m="15">15dk</button>
    <button data-m="60">1s</button>
    <button data-m="240">4s</button>
    <button data-m="1440">Gün</button>
  </div>
</div>
<div class="s">
  <span>Yüksek: <b id="h24">--</b></span>
  <span>Düşük: <b id="l24">--</b></span>
  <span>Hacim: <b id="v24">--</b></span>
  <span>Funding: <b id="fd">--</b></span>
  <span>OI: <b id="oi">--</b></span>
</div>
<div id="c"></div>
<script>
const chart = LightweightCharts.createChart(document.getElementById('c'), {
  layout:{textColor:'#8b949e',background:{type:'solid',color:'#0d1117'}},
  grid:{vertLines:{color:'#161b22'},horzLines:{color:'#161b22'}},
  rightPriceScale:{borderColor:'#30363d'},
  timeScale:{borderColor:'#30363d',timeVisible:true,secondsVisible:false},
});
const cs = chart.addCandlestickSeries({
  upColor:'#3fb950',downColor:'#f85149',borderVisible:false,
  wickUpColor:'#3fb950',wickDownColor:'#f85149',
});

let interval = 5; // minutes
let allCandles = {};
let currentData = [];

// Load data from Binance REST
async function loadData(min) {
  try {
    const p = min || interval;
    const binInt = {1:'1m',5:'5m',15:'15m',60:'1h',240:'4h',1440:'1d'}[p] || '5m';
    
    // Build candles from 1m data
    if (p === 1440) {
      // Daily - use our 2.5 year data
      const r = await fetch('data/btc_daily.json');
      const d = await r.json();
      cs.setData(d.map(x => ({time:x.time, open:x.open, high:x.high, low:x.low, close:x.close})));
      chart.timeScale().fitContent();
      if(d.length) document.getElementById('p').textContent = '$'+d[d.length-1].close.toLocaleString();
      return d;
    }
    
    // Historical 1m candles
    const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=${binInt}&limit=500`);
    const d = await r.json();
    const data = d.map(k => ({
      time: Math.floor(k[0]/1000),
      open: +k[1], high: +k[2], low: +k[3], close: +k[4],
    }));
    
    cs.setData(data);
    chart.timeScale().fitContent();
    currentData = data;
    
    if(data.length) {
      const last = data[data.length-1];
      document.getElementById('p').textContent = '$'+last.close.toLocaleString();
      const ch = (last.close - last.open)/last.open*100;
      document.getElementById('c').textContent = (ch>=0?'+':'')+ch.toFixed(2)+'%';
      document.getElementById('c').className = ch>=0?'grn':'redd';
    }
    return data;
  } catch(e) {
    document.getElementById('p').textContent = 'Hata';
    return [];
  }
}

// WebSocket - realtime update
let ws = null;
function startWS() {
  if(ws) ws.close();
  ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
  
  ws.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      const p = +d.p;
      
      document.getElementById('p').textContent = '$'+p.toLocaleString();
      
      // Update last candle if we have data
      if (currentData.length > 0) {
        const last = currentData[currentData.length-1];
        last.high = Math.max(last.high, p);
        last.low = Math.min(last.low, p);
        last.close = p;
        cs.update(last);
        
        const ch = (p - currentData[0].open) / currentData[0].open * 100;
        document.getElementById('c').textContent = (ch>=0?'+':'')+ch.toFixed(2)+'%';
        document.getElementById('c').className = ch>=0?'grn':'redd';
      }
    } catch(e) {}
  };
  ws.onclose = () => setTimeout(startWS, 2000);
  ws.onerror = () => ws.close();
}

// Futures
async function loadF() {
  try {
    const [oiR, frR, tR] = await Promise.all([
      fetch('https://fapi.binance.com/fapi/v1/openInterest?symbol=BTCUSDT'),
      fetch('https://fapi.binance.com/fapi/v1/fundingRate?symbol=BTCUSDT&limit=1'),
      fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT'),
    ]);
    const [oi, fr, t] = await Promise.all([oiR.json(), frR.json(), tR.json()]);
    document.getElementById('h24').textContent = '$'+parseFloat(t.highPrice).toLocaleString();
    document.getElementById('l24').textContent = '$'+parseFloat(t.lowPrice).toLocaleString();
    document.getElementById('v24').textContent = (parseFloat(t.quoteVolume)/1e9).toFixed(2)+'B';
    document.getElementById('fd').textContent = (parseFloat(fr[0]?.fundingRate||0)*100).toFixed(4)+'%';
    document.getElementById('oi').textContent = (parseFloat(oi.openInterest)/1000).toFixed(1)+'K';
  } catch(e) {}
}

// Timeframe buttons
document.querySelectorAll('.t button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.t button').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    interval = parseInt(b.dataset.m);
    loadData();
  };
});

window.addEventListener('resize', () => {
  chart.applyOptions({width:window.innerWidth, height:window.innerHeight-80});
});

// Start
loadData();
loadF();
setInterval(loadF, 30000);
startWS();
</script>
</body>
</html>
