<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOVA | BTC</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:system-ui,sans-serif;overflow:hidden}
.header{background:#161b22;padding:8px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #30363d;flex-wrap:wrap}
.header h1{font-size:14px;color:#e94560}
#priceD{font-size:20px;font-weight:700}
.green{color:#3fb950}.red{color:#f85149}
.tf{display:flex;gap:4px;margin-left:auto}
.tf button{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px}
.tf button.on{background:#1f6feb;border-color:#1f6feb;color:#fff}
#chart{width:100%;height:calc(100vh - 80px)}
.info{display:flex;gap:12px;font-size:11px;color:#8b949e;padding:4px 16px;background:#161b22;border-bottom:1px solid #30363d;flex-wrap:wrap}
.info span b{color:#c9d1d9}
</style>
</head>
<body>
<div class="header">
  <h1>🐉 HOVA | BTC/USDT</h1>
  <span id="priceD">--</span>
  <span id="chg"></span>
  <div class="tf" id="tfBtns">
    <button data-s="1">1sn</button>
    <button data-s="5" class="on">5sn</button>
    <button data-s="15">15sn</button>
    <button data-s="60">1dk</button>
    <button data-s="300">5dk</button>
    <button data-s="3600">1s</button>
  </div>
</div>
<div class="info">
  <span>H24: <b id="h24">--</b></span>
  <span>L24: <b id="l24">--</b></span>
  <span>Vol: <b id="v24">--</b></span>
  <span>Funding: <b id="fd">--</b></span>
  <span>OI: <b id="oi">--</b></span>
  <span>L/S: <b id="ls">--</b></span>
</div>
<div id="chart"></div>

<script>
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
  layout:{textColor:'#8b949e',background:{type:'solid',color:'#0d1117'}},
  grid:{vertLines:{color:'#161b22'},horzLines:{color:'#161b22'}},
  rightPriceScale:{borderColor:'#30363d'},
  timeScale:{borderColor:'#30363d',timeVisible:true,secondsVisible:true},
});
const mainSeries = chart.addCandlestickSeries({
  upColor:'#3fb950',downColor:'#f85149',borderVisible:false,
  wickUpColor:'#3fb950',wickDownColor:'#f85149',
});

let candleSec = 5; // default 5-second candles
let candles = {}; // time -> {time,open,high,low,close}
let loaded = false;

// Binance REST API via HTTPS (CORS-friendly)
async function loadInit() {
  try {
    const r = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=100');
    const data = await r.json();
    const list = data.map(k => ({
      time: Math.floor(k[0]/1000),
      open: +k[1], high: +k[2], low: +k[3], close: +k[4],
      vol: +k[5]
    }));
    
    // Seed candles from 1m data (convert to our candle resolution)
    for (const c of list) {
      const key = Math.floor(c.time / candleSec) * candleSec;
      if (!candles[key]) {
        candles[key] = {time: key, open: c.open, high: c.high, low: c.low, close: c.close};
      } else {
        const x = candles[key];
        x.high = Math.max(x.high, c.high);
        x.low = Math.min(x.low, c.low);
        x.close = c.close;
      }
    }
    
    // Set chart data
    const sorted = Object.values(candles).sort((a,b) => a.time - b.time);
    mainSeries.setData(sorted);
    chart.timeScale().fitContent();
    
    // Update info
    const last = list[list.length-1];
    document.getElementById('priceD').textContent = '$'+last.close.toLocaleString();
    const ch = (last.close - last.open)/last.open*100;
    document.getElementById('chg').textContent = (ch>=0?'+':'')+ch.toFixed(2)+'%';
    document.getElementById('chg').className = ch>=0?'green':'red';
    
    loaded = true;
  } catch(e) {
    document.getElementById('priceD').textContent = 'Yükleniyor...';
  }
}

// WebSocket - real-time trades
let ws = null;
function wsConnect() {
  if(ws) ws.close();
  ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
  
  ws.onmessage = e => {
    const d = JSON.parse(e.data);
    const p = +d.p; // price
    const q = +d.q; // quantity
    const t = Math.floor(d.T / 1000); // trade time in seconds
    
    // Aggregate into our candle resolution
    const key = Math.floor(t / candleSec) * candleSec;
    
    if (!candles[key]) {
      candles[key] = {time: key, open: p, high: p, low: p, close: p};
    } else {
      const c = candles[key];
      c.high = Math.max(c.high, p);
      c.low = Math.min(c.low, p);
      c.close = p;
    }
    
    // Update chart
    const c = candles[key];
    mainSeries.update(c);
    
    // Update price display (live)
    document.getElementById('priceD').textContent = '$'+p.toLocaleString();
    
    // Get previous close for change calculation
    const keys = Object.keys(candles).sort();
    const idx = keys.indexOf(String(key));
    const prevClose = idx > 0 ? candles[keys[idx-1]].close : p;
    const ch = (p - prevClose) / prevClose * 100;
    document.getElementById('chg').textContent = (ch>=0?'+':'')+ch.toFixed(2)+'%';
    document.getElementById('chg').className = ch>=0?'green':'red';
  };
  
  ws.onclose = () => setTimeout(wsConnect, 1000);
  ws.onerror = () => ws.close();
}

// Futures data (30s)
async function loadFutures() {
  try {
    const [oiR, frR, lsR, tR] = await Promise.all([
      fetch('https://fapi.binance.com/fapi/v1/openInterest?symbol=BTCUSDT'),
      fetch('https://fapi.binance.com/fapi/v1/fundingRate?symbol=BTCUSDT&limit=1'),
      fetch('https://fapi.binance.com/futures/data/globalLongShortAccountRatio?symbol=BTCUSDT&period=1d'),
      fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT'),
    ]);
    const [oi, fr, ls, t] = await Promise.all([oiR.json(), frR.json(), lsR.json(), tR.json()]);
    document.getElementById('h24').textContent = '$'+parseFloat(t.highPrice).toLocaleString();
    document.getElementById('l24').textContent = '$'+parseFloat(t.lowPrice).toLocaleString();
    document.getElementById('v24').textContent = (parseFloat(t.quoteVolume)/1e9).toFixed(2)+'B';
    document.getElementById('fd').textContent = (parseFloat(fr[0]?.fundingRate||0)*100).toFixed(4)+'%';
    document.getElementById('oi').textContent = (parseFloat(oi.openInterest)/1000).toFixed(1)+'K';
    document.getElementById('ls').textContent = parseFloat(ls[0]?.longShortRatio||1).toFixed(2);
  } catch(e) {}
}

// Timeframe buttons
document.querySelectorAll('.tf button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tf button').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    candleSec = parseInt(btn.dataset.s);
    
    // Re-bin existing data
    const oldCandles = Object.values(candles);
    candles = {};
    for (const c of oldCandles) {
      const key = Math.floor(c.time / candleSec) * candleSec;
      if (!candles[key]) {
        candles[key] = {...c, time: key};
      } else {
        const x = candles[key];
        x.high = Math.max(x.high, c.high);
        x.low = Math.min(x.low, c.low);
        x.close = c.close;
      }
    }
    const sorted = Object.values(candles).sort((a,b) => a.time - b.time);
    mainSeries.setData(sorted);
    chart.timeScale().fitContent();
  };
});

// Init
loadInit();
loadFutures();
setInterval(loadFutures, 30000);
wsConnect();

window.addEventListener('resize', () => {
  chart.applyOptions({width: window.innerWidth, height: window.innerHeight - 80});
});
</script>
</body>
</html>
