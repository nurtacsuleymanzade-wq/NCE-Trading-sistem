function SMA(a,p){var r=[];for(var i=p-1;i<a.length;i++){var s=0;for(var j=0;j<p;j++)s+=a[i-j].c;r.push({time:a[i].time,value:s/p});}return r;}
function BB(a,p,k){var m=SMA(a,p),u=[],l=[];for(var i=0;i<m.length;i++){var z=i+p-1,su=0;for(var j=0;j<p;j++)su+=Math.pow(a[z-j].c-m[i].value,2);var sd=Math.sqrt(su/p);u.push({time:m[i].time,value:m[i].value+k*sd});l.push({time:m[i].time,value:m[i].value-k*sd});}return{upper:u,mid:m,lower:l};}
function RSI(a,p){var r=[];for(var i=p;i<a.length;i++){var g=0,ls=0;for(var j=i-p+1;j<=i;j++){var ch=a[j].c-a[j-1].c;if(ch>0)g+=ch;else ls-=ch;}var ag=g/p,al=ls/p;if(al===0){r.push({time:a[i].time,value:100});continue;}r.push({time:a[i].time,value:100-100/(1+ag/al)});}return r;}

function fmt(n){return '$'+Number(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});}

function render(src){
  var data=src.map(function(x){return{time:x.t,open:x.o,high:x.h,low:x.l,close:x.c};});

  var bb=BB(src,20,2);L[3].setData(bb.upper);L[4].setData(bb.mid);L[5].setData(bb.lower);
  var r=RSI(src,14);L[6].setData(r);
  if(r.length)ct.paneHeight(rp,k4.checked?80:0);
  for(var i=0;i<3;i++)L[i].applyOptions({visible:document.getElementById('k'+i).checked});
  for(var i=3;i<6;i++)L[i].applyOptions({visible:k3.checked});
  L[6].applyOptions({visible:k4.checked});
  ct.timeScale().fitContent();

  document.getElementById('c').textContent=(ch>0?'+':'')+ch.toFixed(2)+'%';
  document.getElementById('c').className=ch>=0?'g':'r';
}
