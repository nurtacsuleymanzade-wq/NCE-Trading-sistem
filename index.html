<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>BTC OF</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:system-ui;overflow:hidden}
#hd{background:#161b22;padding:2px 8px;display:flex;align-items:center;gap:6px;border-bottom:1px solid #30363d;flex-wrap:wrap}
#hd h1{color:#e94560;font-size:11px;margin:0}
#pr{font-size:15px;font-weight:700}
.gn{color:#3fb950}.rd{color:#f85149}
#tf{display:flex;gap:1px;margin-left:auto;overflow-x:auto;max-width:60%;-webkit-overflow-scrolling:touch}
#tf button{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:1px 5px;border-radius:2px;cursor:pointer;font-size:8px;white-space:nowrap;flex-shrink:0}
#tf button.on{background:#1f6feb;border-color:#1f6feb;color:#fff}
#info{display:flex;gap:4px;font-size:8px;color:#8b949e;padding:1px 8px;background:#161b22;border-bottom:1px solid #30363d;flex-wrap:wrap;overflow-x:auto;white-space:nowrap}
#info span b{color:#c9d1d9}
#ct{position:relative;width:100%;height:calc(100vh - 56px)}
#tip{display:none;position:absolute;background:rgba(22,27,34,0.95);border:1px solid #30363d;border-radius:6px;padding:6px 8px;font-size:9px;z-index:10;pointer-events:none;min-width:120px}
</style>
</head>
<body>
<div id="hd">
  <h1>🐉 BF</h1>
  <span id="pr">--</span>
  <span id="cg"></span>
  <div id="tf"></div>
</div>
<div id="info">
  <span>H24: <b id="h24">--</b></span>
  <span>L24: <b id="l24">--</b></span>
  <span>Vol: <b id="v24">--</b></span>
  <span>OI: <b id="oi">--</b></span>
  <span>Funding: <b id="fd">--</b></span>
  <span>L/S: <b id="ls">--</b></span>
</div>
<div id="ct"><div id="tip"></div></div>

<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script>
// Data source: VPS if on GitHub Pages, relative if on VPS
var SRV = window.location.hostname.includes('github') ? 'https://surveillance-damages-gym-harper.trycloudflare.com/chart' : '';

var TFs = ['1s','1m','5m','15m','30m','1h','4h','1D','3D'];
var curTF = '1D', curData = [], chart, mainS, volS, delS, tip = document.getElementById('tip');

// Build timeframe buttons
var tb = document.getElementById('tf');
TFs.forEach(function(t){
  var b = document.createElement('button');
  b.textContent = t;
  b.onclick = function(){
    tb.querySelectorAll('button').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on'); curTF = t; loadTF(t);
    b.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  };
  if(t === '1D') b.classList.add('on');
  tb.appendChild(b);
});

// === CHART ===
function initC(){
  chart = LightweightCharts.createChart(document.getElementById('ct'), {
    layout:{textColor:'#8b949e',background:{color:'#0d1117'}},
    grid:{vertLines:{color:'#161b22'},horzLines:{color:'#161b22'}},
    timeScale:{borderColor:'#30363d',timeVisible:curTF=='1s',secondsVisible:curTF=='1s'},
    rightPriceScale:{borderColor:'#30363d'},
  });
  
  mainS = chart.addCandlestickSeries({upColor:'#3fb950',downColor:'#f85149',borderVisible:false,wickUpColor:'#3fb950',wickDownColor:'#f85149',priceScaleId:'right'});
  chart.priceScale('right').applyOptions({scaleMargins:{top:0,bottom:0.3}});
  
  volS = chart.addHistogramSeries({color:'#26a69a',priceFormat:{type:'volume'},priceScaleId:'vol'});
  chart.priceScale('vol').applyOptions({scaleMargins:{top:0.7,bottom:0.15}});
  
  delS = chart.addHistogramSeries({color:'#ef5350',priceFormat:{type:'volume'},priceScaleId:'del'});
  chart.priceScale('del').applyOptions({scaleMargins:{top:0.85,bottom:0}});
  
  // Tooltip
  chart.subscribeCrosshairMove(function(p){
    if(!p.time || p.point === undefined || !curData.length){ tip.style.display='none'; return; }
    var d = p.seriesData.get(mainS);
    if(!d){ tip.style.display='none'; return; }
    
    var dt = new Date(d.time * 1000);
    var ds = ('0'+dt.getUTCDate()).slice(-2)+'/'+('0'+(dt.getUTCMonth()+1)).slice(-2)+'/'+dt.getUTCFullYear();
    var ts = ('0'+dt.getUTCHours()).slice(-2)+':'+('0'+dt.getUTCMinutes()).slice(-2)+':'+('0'+dt.getUTCSeconds()).slice(-2);
    
    var m = null;
    for(var i=0;i<curData.length;i++) if(curData[i].t === d.time || curData[i].time === d.time){ m=curData[i]; break; }
    if(!m) m = {v:0,bv:0,sv:0,del:0};
    
    var vol = m.v||0, bv = m.bv||0, sv = m.sv||(vol-bv), del = m.del||(bv*2-vol), agr = vol ? Math.round(del/vol*100) : 0;
    
    var html = '<div style="color:#e94560;font-weight:700;font-size:10px;margin-bottom:2px">'+ds+' '+ts+'</div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1px 6px;font-size:9px">';
    html += 'O:<span style="text-align:right">$'+d.open.toFixed(1)+'</span>';
    html += 'H:<span style="text-align:right;color:#3fb950">$'+d.high.toFixed(1)+'</span>';
    html += 'L:<span style="text-align:right;color:#f85149">$'+d.low.toFixed(1)+'</span>';
    html += 'C:<span style="text-align:right">$'+d.close.toFixed(1)+'</span>';
    html += 'Vol:<span style="text-align:right">'+vol.toFixed(1)+'</span>';
    html += 'Buy:<span style="text-align:right;color:#3fb950">'+bv.toFixed(1)+'</span>';
    html += 'Sell:<span style="text-align:right;color:#f85149">'+sv.toFixed(1)+'</span>';
    html += 'Delta:<span style="text-align:right;color:'+(del>=0?'#3fb950':'#f85149')+'">'+(del>=0?'+':'')+del.toFixed(1)+'</span>';
    html += 'Agr:<span style="text-align:right;color:'+(agr>=0?'#3fb950':'#f85149')+'">'+(agr>=0?'+':'')+agr+'%</span>';
    html += '</div>';
    
    tip.innerHTML = html;
    var x = Math.min(p.point.x, window.innerWidth-150);
    var y = Math.min(p.point.y, window.innerHeight-200);
    tip.style.cssText = 'display:block;position:absolute;left:'+Math.max(5,x)+'px;top:'+Math.max(5,y-10)+'px';
  });
}

// === LOAD DATA ===
var ws1s = null;

function loadTF(tf){
  if(tf === '1s'){
    load1s();
    return;
  }
  
  // Close 1s WebSocket if open
  if(ws1s){ ws1s.close(); ws1s = null; }
  
  var fn = {'1m':'1m','5m':'5m','15m':'15m','30m':'30m','1h':'1h','4h':'4h','1D':'1d','3D':'3d'}[tf] || '1d';
  
  fetch(SRV+'/data/bars_'+fn+'.json')
  .then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  })
  .then(function(d){
    curData = d;
    var data = d.map(function(x){return{time:x.t,open:x.o,high:x.h,low:x.l,close:x.c};});
    mainS.setData(data);
    volS.setData(d.map(function(x){return{time:x.t,value:x.v,color:'rgba(38,166,154,0.3)'};}));
    delS.setData(d.map(function(x){
      var del = x.bv*2 - x.v;
      return{time:x.t,value:Math.abs(del),color:del>=0?'rgba(38,166,154,0.3)':'rgba(239,83,80,0.3)'};
    }));
    chart.timeScale().fitContent();
    updatePrice(d);
  })
  .catch(function(e){
    document.getElementById('pr').textContent = 'Hata: '+e.message;
  });
}

// === 1-SECOND BARS (real-time from WebSocket aggTrade) ===
var secBars = {};
var secData = [];

function load1s(){
  secBars = {};
  secData = [];
  render1sBars();
  
  if(!ws1s){
    ws1s = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@aggTrade');
    ws1s.onmessage = function(e){
      try {
        var d = JSON.parse(e.data);
        var p = parseFloat(d.p), q = parseFloat(d.q);
        var t = Math.floor(d.T / 1000) + 14400;
        var isBuy = !d.m;  // m=false means buyer is taker = buy
        
        // Create/update 1-second candle
        if(!secBars[t]){
          secBars[t] = {t:t, o:p, h:p, l:p, c:p, v:q, bv:isBuy?q:0, sv:isBuy?0:q};
        } else {
          var c = secBars[t];
          c.h = Math.max(c.h, p); c.l = Math.min(c.l, p); c.c = p;
          c.v += q;
          if(isBuy) c.bv += q; else c.sv += q;
        }
        
        // Keep only last 5 minutes
        var cutoff = t - 300;
        Object.keys(secBars).forEach(function(k){
          if(parseInt(k) < cutoff) delete secBars[k];
        });
        
        render1sBars();
        document.getElementById('pr').textContent = '$'+p.toLocaleString();
      } catch(e2){}
    };
    ws1s.onclose = function(){setTimeout(function(){ws1s = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@aggTrade');},3000);};
  }
}

function render1sBars(){
  var bars = Object.values(secBars).sort(function(a,b){return a.t-b.t;});
  if(!bars.length) return;
  
  var data = bars.map(function(x){return{time:x.t, open:x.o, high:x.h, low:x.l, close:x.c};});
  mainS.setData(data);
  
  volS.setData(bars.map(function(x){return{time:x.t, value:x.v, color:'rgba(38,166,154,0.3)'};}));
  
  delS.setData(bars.map(function(x){
    var del = x.bv - x.sv;
    return{time:x.t, value:Math.abs(del), color:del>=0?'rgba(38,166,154,0.3)':'rgba(239,83,80,0.3)'};
  }));
  
  chart.timeScale().fitContent();
  curData = bars;
  
  var last = bars[bars.length-1];
  document.getElementById('pr').textContent = '$'+last.c.toLocaleString();
}

function updatePrice(d){
  if(!d||!d.length) return;
  var last = d[d.length-1], prev = d.length>1 ? d[d.length-2].c : last.c;
  // For data with 'c' field (aggregated format)
  var lc = last.c || last.close;
  var pc = prev.c || prev.close || lc;
  var ch = (lc-pc)/pc*100;
  document.getElementById('pr').textContent = '$'+lc.toLocaleString();
  document.getElementById('cg').textContent = (ch>0?'+':'')+ch.toFixed(2)+'%';
  document.getElementById('cg').className = ch>=0?'gn':'rd';
}

// Futures data
function loadFut(){
  Promise.all([
    fetch('https://fapi.binance.com/fapi/v1/openInterest?symbol=BTCUSDT'),
    fetch('https://fapi.binance.com/fapi/v1/fundingRate?symbol=BTCUSDT&limit=1'),
    fetch('https://fapi.binance.com/futures/data/globalLongShortAccountRatio?symbol=BTCUSDT&period=1d'),
    fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT'),
  ]).then(function(r){return Promise.all(r.map(function(x){return x.json();}));})
  .then(function(d){
    document.getElementById('h24').innerHTML = '<b>$'+parseFloat(d[3].highPrice).toLocaleString()+'</b>';
    document.getElementById('l24').innerHTML = '<b>$'+parseFloat(d[3].lowPrice).toLocaleString()+'</b>';
    document.getElementById('v24').innerHTML = '<b>'+(parseFloat(d[3].quoteVolume)/1e9).toFixed(2)+'B</b>';
    document.getElementById('oi').innerHTML = '<b>'+(parseFloat(d[0].openInterest)/1000).toFixed(1)+'K</b>';
    document.getElementById('fd').innerHTML = '<b>'+(parseFloat(d[1][0]?.fundingRate||0)*100).toFixed(4)+'%</b>';
    document.getElementById('ls').innerHTML = '<b>'+parseFloat(d[2][0]?.longShortRatio||1).toFixed(2)+'</b>';
  });
}

window.onresize = function(){chart.applyOptions({width:window.innerWidth,height:window.innerHeight-56});};

initC();
loadTF('1D');
loadFut();
setInterval(loadFut, 30000);
</script>
</body>
</html>
