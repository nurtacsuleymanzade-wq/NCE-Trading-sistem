<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>BTC OF</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:system-ui;overflow:hidden}
#hd{background:#161b22;padding:2px 8px;display:flex;align-items:center;gap:6px;border-bottom:1px solid #30363d;flex-wrap:wrap}
#hd h1{color:#e94560;font-size:11px;margin:0}#pr{font-size:15px;font-weight:700}
.gn{color:#3fb950}.rd{color:#f85149}
#tf{display:flex;gap:1px;margin-left:auto;overflow-x:auto;max-width:60%;-webkit-overflow-scrolling:touch}
#tf button{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:1px 5px;border-radius:2px;cursor:pointer;font-size:8px;white-space:nowrap;flex-shrink:0}
#tf button.on{background:#1f6feb;border-color:#1f6feb;color:#fff}
#info{display:flex;gap:3px;font-size:7px;color:#8b949e;padding:1px 8px;background:#161b22;border-bottom:1px solid #30363d;flex-wrap:wrap;overflow-x:auto;white-space:nowrap}
#info span b{color:#c9d1d9}
#ct{position:relative;width:100%;height:calc(100vh - 54px)}
#tip{display:none;position:absolute;background:rgba(22,27,34,0.95);border:1px solid #30363d;border-radius:6px;padding:6px 8px;font-size:9px;z-index:10;pointer-events:none;min-width:120px}
.panel-hdr{display:flex;justify-content:space-between;align-items:center;color:#8b949e;font-size:8px;padding:0 4px;margin-bottom:1px}
.panel-hdr .x{color:#f85149;cursor:pointer;font-size:10px;padding:0 3px;border-radius:2px}
.panel-hdr .x:hover{background:#30363d}
#panel-bar{display:flex;gap:3px;padding:2px 8px;background:#161b22;border-bottom:1px solid #30363d;overflow-x:auto}
#panel-bar button{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:1px 6px;border-radius:3px;cursor:pointer;font-size:8px;white-space:nowrap}
#panel-bar button.on{background:#1f6feb;border-color:#1f6feb;color:#fff}
</style>
</head>
<body>
<div id="hd">
  <h1>🐉 BF</h1>
  <span id="pr">--</span><span id="cg"></span>
  <div id="tf"></div>
</div>
<div id="info">
  <span>H24: <b id="n24">--</b></span>
  <span>L24: <b id="x24">--</b></span>
  <span>OI:<b id="oi">--</b></span>
  <span>FD:<b id="fd">--</b></span>
  <span>L/S:<b id="ls">--</b></span>
  <span>MP:<b id="mp">--</b></span>
</div>
<div id="panel-bar"></div>
<div id="ct">
  <div id="tip"></div>
  <div id="volLabel" style="position:absolute;bottom:30%;left:4px;background:#161b22;border:1px solid #30363d;border-radius:4px;padding:1px 6px;font-size:8px;color:#26a69a;display:flex;align-items:center;gap:6px;z-index:5">📊 Volume <span class="x" style="color:#f85149;cursor:pointer;font-size:10px" onclick="togglePanel('vol')">✕</span></div>
  <div id="delLabel" style="position:absolute;bottom:12%;left:4px;background:#161b22;border:1px solid #30363d;border-radius:4px;padding:1px 6px;font-size:8px;color:#ef5350;display:flex;align-items:center;gap:6px;z-index:5">📉 Delta <span class="x" style="color:#f85149;cursor:pointer;font-size:10px" onclick="togglePanel('del')">✕</span></div>
</div>

<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script>
// Data source
var SRV = 'https://surveillance-damages-gym-harper.trycloudflare.com/chart';
var TFs = ['1s','1m','5m','15m','30m','1h','4h','1D','3D'];
var curTF = '1D', curData = [], chart, mainS, volS, delS, tip = document.getElementById('tip');
var panels = {vol:true, del:true};
var ws1s = null, pnBar = document.getElementById('panel-bar');

// Panel bar
function updPanelBar(){
  pnBar.innerHTML = '';
  var all = {vol:'Volume', del:'Delta'};
  Object.keys(all).forEach(function(k){
    if(panels[k]) return;
    var b = document.createElement('button');
    b.textContent = '+ '+all[k];
    b.onclick = function(){ panels[k]=true; document.getElementById(k+'Label').style.display='flex'; updPanelBar(); resizeChart(); };
    pnBar.appendChild(b);
  });
}
updPanelBar();

// Timeframe buttons
var tb = document.getElementById('tf');
TFs.forEach(function(t){
  var b = document.createElement('button');
  b.textContent = t;
  b.onclick = function(){
    tb.querySelectorAll('button').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on'); curTF = t; loadTF(t);
    b.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  };
  if(t === '1D') b.classList.add('on');
  tb.appendChild(b);
});

function initC(){
  chart = LightweightCharts.createChart(document.getElementById('ct'), {
    layout:{textColor:'#8b949e',background:{color:'#0d1117'}},
    grid:{vertLines:{color:'#161b22'},horzLines:{color:'#161b22'}},
    timeScale:{borderColor:'#30363d',timeVisible:curTF=='1s',secondsVisible:curTF=='1s'},
    rightPriceScale:{borderColor:'#30363d'},
  });
  
  mainS = chart.addCandlestickSeries({upColor:'#3fb950',downColor:'#f85149',borderVisible:false,wickUpColor:'#3fb950',wickDownColor:'#f85149',priceScaleId:'right'});
  
  volS = chart.addHistogramSeries({color:'#26a69a',priceFormat:{type:'volume'},priceScaleId:'vol'});
  delS = chart.addHistogramSeries({color:'#ef5350',priceFormat:{type:'volume'},priceScaleId:'del'});
  
  chart.subscribeCrosshairMove(function(p){
    if(!p.time||p.point===undefined||!curData.length){ tip.style.display='none'; return; }
    var d=p.seriesData.get(mainS);
    if(!d){ tip.style.display='none'; return; }
    var dt=new Date(d.time*1000);
    var ds=('0'+dt.getUTCDate()).slice(-2)+'/'+('0'+(dt.getUTCMonth()+1)).slice(-2)+'/'+dt.getUTCFullYear();
    var ts=('0'+dt.getUTCHours()).slice(-2)+':'+('0'+dt.getUTCMinutes()).slice(-2)+':'+('0'+dt.getUTCSeconds()).slice(-2);
    var m=null;
    for(var i=0;i<curData.length;i++) if(curData[i].t===d.time||curData[i].time===d.time){ m=curData[i]; break; }
    if(!m) m={v:0,bv:0,sv:0,del:0};
    var vol=m.v||0, bv=m.bv||0, sv=m.sv||(vol-bv), del=m.del||(bv*2-vol), agr=vol?Math.round(del/vol*100):0;
    var h='<div style="color:#e94560;font-weight:700;font-size:10px;margin-bottom:2px">'+ds+' '+ts+'</div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:1px 6px;font-size:9px">';
    h+='O:<span style="text-align:right">$'+d.open.toFixed(1)+'</span>';
    h+='H:<span style="text-align:right;color:#3fb950">$'+d.high.toFixed(1)+'</span>';
    h+='L:<span style="text-align:right;color:#f85149">$'+d.low.toFixed(1)+'</span>';
    h+='C:<span style="text-align:right">$'+d.close.toFixed(1)+'</span>';
    h+='Vol:<span style="text-align:right">'+vol.toFixed(1)+'</span>';
    h+='Buy:<span style="text-align:right;color:#3fb950">'+bv.toFixed(1)+'</span>';
    h+='Sell:<span style="text-align:right;color:#f85149">'+sv.toFixed(1)+'</span>';
    h+='Delta:<span style="text-align:right;color:'+(del>=0?'#3fb950':'#f85149')+'">'+(del>=0?'+':'')+del.toFixed(1)+'</span>';
    h+='Agr:<span style="text-align:right;color:'+(agr>=0?'#3fb950':'#f85149')+'">'+(agr>=0?'+':'')+agr+'%</span></div>';
    tip.innerHTML=h;
    var x=Math.min(p.point.x,window.innerWidth-150), y=Math.min(p.point.y,window.innerHeight-200);
    tip.style.cssText='display:block;position:absolute;left:'+Math.max(5,x)+'px;top:'+Math.max(5,y-10)+'px';
  });
}

function togglePanel(p){
  panels[p] = !panels[p];
  document.getElementById(p+'Label').style.display = panels[p] ? 'flex' : 'none';
  updPanelBar();
  resizeChart();
}

function resizeChart(){
  var volH = panels.vol ? 0.25 : 0;
  var delH = panels.del ? 0.15 : 0;
  var mainH = 1 - volH - delH;
  chart.priceScale('right').applyOptions({scaleMargins:{top:0,bottom:volH+delH}});
  chart.priceScale('vol').applyOptions({scaleMargins:{top:mainH,bottom:volH+delH-0.01}});
  chart.priceScale('del').applyOptions({scaleMargins:{top:mainH+volH,bottom:0.01}});
}

// Volume panel label
function addVolLabels(){
  // Custom label using title attribute or custom rendering
  // Lightweight Charts doesn't support direct labels on price scales
  // Will use HTML overlay instead
}

// === LOAD DATA ===
function loadTF(tf){
  if(tf === '1s'){ load1s(); return; }
  if(ws1s){ ws1s.close(); ws1s=null; }
  
  var fn = {'1m':'1m','5m':'5m','15m':'15m','30m':'30m','1h':'1h','4h':'4h','1D':'1d','3D':'3d'}[tf]||'1d';
  
  fetch(SRV+'/data/bars_'+fn+'.json')
  .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(function(d){
    curData = d;
    var data = d.map(function(x){return{time:x.t,open:x.o,high:x.h,low:x.l,close:x.c};});
    mainS.setData(data);
    volS.setData(d.map(function(x){return{time:x.t,value:x.v,color:'rgba(38,166,154,0.3)'};}));
    delS.setData(d.map(function(x){
      var del = x.bv*2 - x.v;
      return{time:x.t,value:Math.abs(del),color:del>=0?'rgba(38,166,154,0.3)':'rgba(239,83,80,0.3)'};
    }));
    chart.timeScale().fitContent();
    resizeChart();
    
    // Supplement with latest Binance data
    fetchBinanceLatest(tf, data);
  })
  .catch(function(e){ document.getElementById('pr').textContent='Hata: '+e.message; });
}

// Supplement archive data with latest from Binance REST API
function fetchBinanceLatest(tf, existingData){
  var binInt = {'1m':'1m','5m':'5m','15m':'15m','30m':'30m','1h':'1h','4h':'4h','1D':'1d','3D':'1d'}[tf]||'1d';
  var limit = tf === '1D' || tf === '3D' ? 30 : 100;
  
  fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval='+binInt+'&limit='+limit)
  .then(function(r){ return r.json(); })
  .then(function(k){
    var newBars = k.map(function(c){
      var ts = Math.floor(c[0]/1000) + 14400;
      return {t:ts, o:+c[1], h:+c[2], l:+c[3], c:+c[4], v:+c[5], bv:+c[9]};
    });
    
    // Merge: keep archive data, add newer ones
    var lastArchiveT = existingData.length ? existingData[existingData.length-1].time : 0;
    var merged = existingData.slice();
    
    newBars.forEach(function(b){
      if(b.t > lastArchiveT){
        merged.push({time:b.t, open:b.o, high:b.h, low:b.l, close:b.c});
      }
    });
    
    // Update chart
    if(merged.length > existingData.length){
      mainS.setData(merged);
      chart.timeScale().fitContent();
    }
    
    // Update curData with full data
    curData = curData.concat(newBars.filter(function(b){return b.t > (curData.length ? curData[curData.length-1].t : 0);}));
    
    // Update vols/del with new data
    if(newBars.length){
      var oldLen = curData.length - newBars.length;
      volS.setData(curData.map(function(x,i){
        return{time:x.time||x.t, value:x.v||0, color:'rgba(38,166,154,0.3)'};
      }));
      delS.setData(curData.map(function(x,i){
        var del = (x.bv||0)*2 - (x.v||0);
        return{time:x.time||x.t, value:Math.abs(del), color:del>=0?'rgba(38,166,154,0.3)':'rgba(239,83,80,0.3)'};
      }));
    }
    
    // Show current price from Binance API
    var lastCandle = newBars.length ? newBars[newBars.length-1] : null;
    if(lastCandle){
      updatePrice([{c:lastCandle.c}]);
    }
    updateTFStats(tf);
  })
  .catch(function(e){
    // Fallback: use archive price + WS
    updatePrice(existingData);
    updateTFStats(tf);
  });
}
var secBars={};
function load1s(){
  secBars={}; curData=[];
  if(!ws1s){
    ws1s = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@aggTrade');
    ws1s.onmessage = function(e){
      try {
        var d=JSON.parse(e.data), p=parseFloat(d.p), q=parseFloat(d.q);
        var t=Math.floor(d.T/1000)+14400, buy=!d.m;
        if(!secBars[t]){ secBars[t]={t:t,o:p,h:p,l:p,c:p,v:q,bv:buy?q:0,sv:buy?0:q}; }
        else { var c=secBars[t]; c.h=Math.max(c.h,p);c.l=Math.min(c.l,p);c.c=p;c.v+=q;if(buy)c.bv+=q;else c.sv+=q; }
        var cutoff=t-300; Object.keys(secBars).forEach(function(k){if(parseInt(k)<cutoff)delete secBars[k];});
        render1s(); document.getElementById('pr').textContent='$'+p.toLocaleString();
      } catch(e2){}
    };
    ws1s.onclose=function(){setTimeout(function(){ws1s=new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@aggTrade');},3000);};
  }
}

function render1s(){
  var bars=Object.values(secBars).sort(function(a,b){return a.t-b.t;});
  if(!bars.length) return;
  curData=bars;
  mainS.setData(bars.map(function(x){return{time:x.t,open:x.o,high:x.h,low:x.l,close:x.c};}));
  volS.setData(bars.map(function(x){return{time:x.t,value:x.v,color:'rgba(38,166,154,0.3)'};}));
  delS.setData(bars.map(function(x){var d=x.bv-x.sv;return{time:x.t,value:Math.abs(d),color:d>=0?'rgba(38,166,154,0.3)':'rgba(239,83,80,0.3)'};}));
  chart.timeScale().fitContent(); resizeChart();
}

function updatePrice(d){
  if(!d||!d.length)return;
  var last=d[d.length-1], prev=d.length>1?d[d.length-2].c||d[d.length-2].close:0;
  var lc=last.c||last.close, pc=prev.c||prev.close||lc;
  if(!lc)return;
  var ch=(lc-pc)/pc*100;
  document.getElementById('pr').textContent='$'+lc.toLocaleString();
  document.getElementById('cg').textContent=(ch>0?'+':'')+ch.toFixed(2)+'%';
  document.getElementById('cg').className=ch>=0?'gn':'rd';
}

// Per-timeframe stats
function updateTFStats(tf){
  if(!curData.length) return;
  var bars = curData;
  
  // Calculate stats from current candle data
  var high=-Infinity, low=Infinity, vol=0, buyV=0, sellV=0;
  var startIdx = Math.max(0, bars.length-20); // last 20 bars
  
  for(var i=startIdx; i<bars.length; i++){
    var b = bars[i];
    var h = b.h||b.high||0, l = b.l||b.low||Infinity;
    if(h > high) high = h;
    if(l < low) low = l;
    vol += b.v||0;
    buyV += b.bv||0;
    sellV += b.sv||(b.v - (b.bv||0));
  }
  
  document.getElementById('n24').innerHTML = '<b>$'+(high?high.toLocaleString():'--')+'</b>';
  document.getElementById('x24').innerHTML = '<b>$'+(low===Infinity?'--':low.toLocaleString())+'</b>';
  
  // OI, Funding, L/S from live API (per timeframe)
  Promise.all([
    fetch('https://fapi.binance.com/fapi/v1/openInterest?symbol=BTCUSDT'),
    fetch('https://fapi.binance.com/fapi/v1/fundingRate?symbol=BTCUSDT&limit=1'),
    fetch('https://fapi.binance.com/futures/data/globalLongShortAccountRatio?symbol=BTCUSDT&period=1d'),
  ]).then(function(r){return Promise.all(r.map(function(x){return x.json();}));})
  .then(function(d){
    document.getElementById('oi').innerHTML = '<b>'+(parseFloat(d[0].openInterest)/1000).toFixed(1)+'K</b>';
    document.getElementById('fd').innerHTML = '<b>'+(parseFloat(d[1][0]?.fundingRate||0)*100).toFixed(4)+'%</b>';
    document.getElementById('ls').innerHTML = '<b>'+parseFloat(d[2][0]?.longShortRatio||1).toFixed(2)+'</b>';
    
    // Max Pain (approximate - mid of last 10 candles)
    var mp = bars.length > 10 ? 
      bars.slice(-10).reduce(function(s,x){return s+(x.c||x.close||0);},0)/Math.min(10,bars.length) : 
      (bars[bars.length-1].c||bars[bars.length-1].close||0);
    document.getElementById('mp').innerHTML = '<b>$'+mp.toFixed(0)+'</b>';
  });
}

window.onresize = function(){ chart.applyOptions({width:window.innerWidth,height:window.innerHeight-54}); };

initC();
loadTF('1D');
setInterval(function(){ updateTFStats(curTF); }, 30000);
</script>
</body>
</html>
