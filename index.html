<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>BTC</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:system-ui;overflow:hidden}
#hd{background:#161b22;padding:4px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #30363d;flex-wrap:wrap}
#hd h1{color:#e94560;font-size:12px;margin:0}
#pr{font-size:16px;font-weight:700}
.gn{color:#3fb950}.rd{color:#f85149}
#tf{display:flex;gap:2px;margin-left:auto;overflow-x:auto;max-width:55%;-webkit-overflow-scrolling:touch}
#tf button{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 6px;border-radius:3px;cursor:pointer;font-size:9px;white-space:nowrap;flex-shrink:0}
#tf button.on{background:#1f6feb;border-color:#1f6feb;color:#fff}
#info{display:flex;gap:8px;font-size:9px;color:#8b949e;padding:2px 10px;background:#161b22;border-bottom:1px solid #30363d;flex-wrap:wrap;overflow-x:auto}
#info span b{color:#c9d1d9}
</style>
</head>
<body>
<div id="hd">
  <h1>🐉 BTC</h1>
  <span id="pr">--</span>
  <span id="cg"></span>
  <div id="tf"></div>
</div>
<div id="info">
  <span>H24: <b id="h24">--</b></span>
  <span>L24: <b id="l24">--</b></span>
  <span>Vol: <b id="v24">--</b></span>
  <span>OI: <b id="oi">--</b></span>
  <span>Funding: <b id="fd">--</b></span>
  <span>L/S: <b id="ls">--</b></span>
</div>
<div id="ct" style="position:relative;width:100%;height:calc(100vh - 62px)">
  <div id="tip" style="display:none;position:absolute;background:rgba(22,27,34,0.95);border:1px solid #30363d;border-radius:6px;padding:8px 10px;font-size:10px;z-index:10;pointer-events:none;min-width:140px"></div>
</div>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script>
var TF = ['1s','1m','5m','15m','30m','1h','4h','1D','3D'];
var TF_MAP = {'1s':['1m',1],'1m':['1m',120],'5m':['5m',96],'15m':['15m',96],'30m':['30m',96],'1h':['1h',168],'4h':['4h',120],'1D':['1d',365],'3D':['3d',180]};

var curTF = '1D', curData = [], chart, mainS, volS, delS, tip = document.getElementById('tip');

// Timeframe buttons
var tfBar = document.getElementById('tf');
TF.forEach(function(t){
  var b = document.createElement('button');
  b.textContent = t;
  b.onclick = function(){
    tfBar.querySelectorAll('button').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');
    curTF = t;
    loadData(t);
    b.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  };
  if(t === '1D') b.classList.add('on');
  tfBar.appendChild(b);
});

// Init chart
function initChart(){
  chart = LightweightCharts.createChart(document.getElementById('ct'), {
    layout: {textColor:'#8b949e',background:{color:'#0d1117'}},
    grid: {vertLines:{color:'#161b22'},horzLines:{color:'#161b22'}},
    timeScale: {borderColor:'#30363d',timeVisible:TF[curTF]=='1s',secondsVisible:TF[curTF]=='1s'},
    rightPriceScale: {borderColor:'#30363d'},
    crosshair: {mode:0},
  });
  
  mainS = chart.addCandlestickSeries({upColor:'#3fb950',downColor:'#f85149',borderVisible:false,wickUpColor:'#3fb950',wickDownColor:'#f85149',priceScaleId:'right'});
  chart.priceScale('right').applyOptions({scaleMargins:{top:0,bottom:0.3}});
  
  volS = chart.addHistogramSeries({color:'#26a69a',priceFormat:{type:'volume'},priceScaleId:'vol'});
  chart.priceScale('vol').applyOptions({scaleMargins:{top:0.7,bottom:0.15}});
  
  delS = chart.addHistogramSeries({color:'#ef5350',priceFormat:{type:'volume'},priceScaleId:'del'});
  chart.priceScale('del').applyOptions({scaleMargins:{top:0.85,bottom:0}});
  
  chart.subscribeCrosshairMove(function(param){
    if(!param.time || param.point === undefined || !curData.length){
      tip.style.display = 'none';
      return;
    }
    var d = param.seriesData.get(mainS);
    if(!d){ tip.style.display = 'none'; return; }
    
    var dt = new Date(d.time * 1000);
    var dateStr = ('0'+dt.getUTCDate()).slice(-2)+'/'+('0'+(dt.getUTCMonth()+1)).slice(-2)+'/'+dt.getUTCFullYear();
    var timeStr = ('0'+dt.getUTCHours()).slice(-2)+':'+('0'+dt.getUTCMinutes()).slice(-2)+':'+('0'+dt.getUTCSeconds()).slice(-2);
    
    // Find matching data point for delta/volume
    var match = null;
    for(var i=0;i<curData.length;i++){
      if(curData[i].time === d.time){ match = curData[i]; break; }
    }
    
    var vol = match ? match.volume : 0;
    var del = match ? match.delta : 0;
    var buy = match ? match.buyVol : 0;
    var sell = match ? match.sellVol : 0;
    var agg = match ? Math.round(del / (vol || 1) * 100) : 0;
    
    var html = '<div style="color:#e94560;font-weight:700;margin-bottom:3px">'+dateStr+' '+timeStr+'</div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 8px">';
    html += '<span style="color:#8b949e">O:</span><span style="text-align:right">$'+d.open.toLocaleString()+'</span>';
    html += '<span style="color:#8b949e">H:</span><span style="text-align:right;color:#3fb950">$'+d.high.toLocaleString()+'</span>';
    html += '<span style="color:#8b949e">L:</span><span style="text-align:right;color:#f85149">$'+d.low.toLocaleString()+'</span>';
    html += '<span style="color:#8b949e">C:</span><span style="text-align:right">$'+d.close.toLocaleString()+'</span>';
    html += '<span style="color:#8b949e">Vol:</span><span style="text-align:right">'+(vol/1).toFixed(1)+' BTC</span>';
    html += '<span style="color:#8b949e">Buy:</span><span style="text-align:right;color:#3fb950">'+(buy/1).toFixed(1)+'</span>';
    html += '<span style="color:#8b949e">Sell:</span><span style="text-align:right;color:#f85149">'+(sell/1).toFixed(1)+'</span>';
    html += '<span style="color:#8b949e">Delta:</span><span style="text-align:right;color:'+(del>=0?'#3fb950':'#f85149')+'">'+(del>=0?'+':'')+del.toFixed(1)+'</span>';
    html += '<span style="color:#8b949e">Agr:</span><span style="text-align:right;color:'+(agg>50?'#3fb950':'#f85149')+'">'+agg+'%</span>';
    html += '</div>';
    
    tip.innerHTML = html;
    var x = Math.min(param.point.x, window.innerWidth - 160);
    var y = Math.min(param.point.y, window.innerHeight - 200);
    tip.style.left = Math.max(5,x)+'px';
    tip.style.top = Math.max(5,y-10)+'px';
    tip.style.display = 'block';
  });
}

function loadData(tf){
  var p = TF_MAP[tf] || TF_MAP['1D'];
  var intv = p[0], lim = p[1];
  
  // For 1s, use 1m data
  if(tf === '1s'){ intv = '1m'; lim = 60; }
  
  fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval='+intv+'&limit='+lim)
  .then(function(r){return r.json();})
  .then(function(k){
    curData = k.map(function(c){
      var ts = Math.floor(c[0]/1000) + 14400;
      return {
        time: ts, open:+c[1], high:+c[2], low:+c[3], close:+c[4],
        volume:+c[5], buyVol:+c[9], sellVol:+c[5]-+c[9],
        delta:+c[9]*2 - +c[5]
      };
    });
    
    mainS.setData(curData.map(function(x){return{time:x.time,open:x.open,high:x.high,low:x.low,close:x.close};}));
    volS.setData(curData.map(function(x){return{time:x.time,value:x.volume,color:'rgba(38,166,154,0.3)'};}));
    delS.setData(curData.map(function(x){return{time:x.time,value:Math.abs(x.delta),color:x.delta>=0?'rgba(38,166,154,0.3)':'rgba(239,83,80,0.3)'};}));
    
    chart.timeScale().fitContent();
    
    var last = curData[curData.length-1];
    var prev = curData.length>1 ? curData[curData.length-2].close : last.close;
    var ch = (last.close-prev)/prev*100;
    document.getElementById('pr').textContent = '$'+last.close.toLocaleString();
    document.getElementById('cg').textContent = (ch>0?'+':'')+ch.toFixed(2)+'%';
    document.getElementById('cg').className = ch>=0?'gn':'rd';
  });
}

// Futures data
function loadFut(){
  Promise.all([
    fetch('https://fapi.binance.com/fapi/v1/openInterest?symbol=BTCUSDT'),
    fetch('https://fapi.binance.com/fapi/v1/fundingRate?symbol=BTCUSDT&limit=1'),
    fetch('https://fapi.binance.com/futures/data/globalLongShortAccountRatio?symbol=BTCUSDT&period=1d'),
    fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT'),
  ]).then(function(r){return Promise.all(r.map(function(x){return x.json();}));})
  .then(function(d){
    document.getElementById('h24').innerHTML = '<b>$'+parseFloat(d[3].highPrice).toLocaleString()+'</b>';
    document.getElementById('l24').innerHTML = '<b>$'+parseFloat(d[3].lowPrice).toLocaleString()+'</b>';
    document.getElementById('v24').innerHTML = '<b>'+(parseFloat(d[3].quoteVolume)/1e9).toFixed(2)+'B</b>';
    document.getElementById('oi').innerHTML = '<b>'+(parseFloat(d[0].openInterest)/1000).toFixed(1)+'K</b>';
    document.getElementById('fd').innerHTML = '<b>'+(parseFloat(d[1][0]?.fundingRate||0)*100).toFixed(4)+'%</b>';
    document.getElementById('ls').innerHTML = '<b>'+parseFloat(d[2][0]?.longShortRatio||1).toFixed(2)+'</b>';
  });
}

// WebSocket live
var ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
ws.onmessage = function(e){
  try {
    var d = JSON.parse(e.data), p = parseFloat(d.p);
    document.getElementById('pr').textContent = '$'+p.toLocaleString();
    if(curData.length){
      var last = curData[curData.length-1];
      last.high = Math.max(last.high, p);
      last.low = Math.min(last.low, p);
      last.close = p;
      mainS.update({time:last.time,open:last.open,high:last.high,low:last.low,close:last.close});
    }
  } catch(e2){}
};
ws.onclose = function(){setTimeout(function(){ws=new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');},3000);};

window.onresize = function(){chart.applyOptions({width:window.innerWidth,height:window.innerHeight-62});};

initChart();
loadData('1D');
loadFut();
setInterval(loadFut, 30000);
</script>
</body>
</html>
