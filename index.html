<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BTC</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
body{margin:0;background:#0d1117;color:#c9d1d9;font-family:system-ui;overflow:hidden}
.h{background:#161b22;padding:5px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #30363d}
.h h1{color:#e94560;font-size:14px;margin:0}
#pd{font-size:20px;font-weight:700}
.grn{color:#3fb950}.red{color:#f85149}
.tf{display:flex;gap:4px;margin-left:auto}
.tf button{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px}
.tf button.on{background:#1f6feb;border-color:#1f6feb;color:#fff}
#ct{width:100%;height:calc(100vh - 42px)}
</style>
</head>
<body>
<div class="h">
  <h1>🐉 BTC</h1>
  <span id="pd">--</span>
  <span id="ch"></span>
  <div class="tf">
    <button data-i="1d" class="on">Gun</button>
    <button data-i="1h">1s</button>
    <button data-i="1m">1dk</button>
  </div>
</div>
<div id="ct"></div>
<script>
var ch,cs;

function init(){
  ch=LightweightCharts.createChart(document.getElementById('ct'),{
    layout:{textColor:'#8b949e',background:{color:'#0d1117'}},
    grid:{vertLines:{color:'#161b22'},horzLines:{color:'#161b22'}},
    timeScale:{borderColor:'#30363d',timeVisible:true,secondsVisible:false},
    rightPriceScale:{borderColor:'#30363d'},
  });
  cs=ch.addCandlestickSeries({upColor:'#3fb950',downColor:'#f85149',borderVisible:false,wickUpColor:'#3fb950',wickDownColor:'#f85149'});
}

function load(iv,lim){
  var intv={1d:'1d',1h:'1h',1m:'1m'}[iv];
  var lims={1d:365,1h:168,1m:100};
  var l=lim||lims[iv];
  
  fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval='+intv+'&limit='+l)
  .then(function(r){return r.json();})
  .then(function(k){
    var data=k.map(function(c){
      return{
        time:Math.floor(c[0]/1000),
        open:parseFloat(c[1]),
        high:parseFloat(c[2]),
        low:parseFloat(c[3]),
        close:parseFloat(c[4])
      };
    });
    
    cs.setData(data);
    ch.timeScale().fitContent();
    
    var last=data[data.length-1];
    var prev=data.length>1?data[data.length-2].close:last.close;
    var change=(last.close-prev)/prev*100;
    
    document.getElementById('pd').textContent='$'+last.close.toLocaleString();
    document.getElementById('ch').textContent=(change>0?'+':'')+change.toFixed(2)+'%';
    document.getElementById('ch').className=change>=0?'grn':'red';
  });
}

// Init
init();
load('1d');

// Timeframe buttons
document.querySelectorAll('.tf button').forEach(function(b){
  b.onclick=function(){
    document.querySelectorAll('.tf button').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');
    load(b.dataset.i);
  };
});

// WebSocket
var ws=new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
ws.onmessage=function(e){
  try{
    var d=JSON.parse(e.data);
    document.getElementById('pd').textContent='$'+parseFloat(d.p).toLocaleString();
  }catch(e2){}
};
ws.onclose=function(){setTimeout(function(){
  ws=new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
},3000);};

window.onresize=function(){ch.applyOptions({width:window.innerWidth,height:window.innerHeight-42});};
</script>
</body>
</html>
