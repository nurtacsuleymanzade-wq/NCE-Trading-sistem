<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOVA | BTC/USDT Canlı</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI',sans-serif}
.header{background:#161b22;padding:10px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #30363d;flex-wrap:wrap}
.header h1{font-size:16px;color:#e94560}
#priceDisplay{font-size:22px;font-weight:bold}
#change{font-size:14px}#change.green{color:#3fb950}#change.red{color:#f85149}
#chart{width:100%;height:calc(100vh - 110px)}
.controls{display:flex;gap:6px;margin-left:auto}
.tf-btn{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px}
.tf-btn.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
.tf-btn:hover{background:#30363d}
.info-bar{background:#161b22;padding:6px 20px;display:flex;gap:20px;font-size:12px;color:#8b949e;border-bottom:1px solid #30363d}
.info-bar span b{color:#c9d1d9}
</style>
</head>
<body>
<div class="header">
  <h1>🐉 HOVA | BTC/USDT</h1>
  <span id="priceDisplay">---</span>
  <span id="change"></span>
  <div class="controls">
    <button class="tf-btn" data-tf="1m">1m</button>
    <button class="tf-btn active" data-tf="5m">5m</button>
    <button class="tf-btn" data-tf="15m">15m</button>
    <button class="tf-btn" data-tf="1h">1h</button>
    <button class="tf-btn" data-tf="4h">4h</button>
    <button class="tf-btn" data-tf="1d">1d</button>
  </div>
</div>
<div class="info-bar">
  <span>Yüksek: <b id="high24h">--</b></span>
  <span>Düşük: <b id="low24h">--</b></span>
  <span>Hacim: <b id="vol24h">--</b></span>
  <span>Funding: <b id="funding">--</b></span>
  <span>OI: <b id="oi">--</b></span>
  <span>L/S: <b id="ls">--</b></span>
</div>
<div id="chart"></div>

<script>
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
  layout:{textColor:'#8b949e',background:{type:'solid',color:'#0d1117'}},
  grid:{vertLines:{color:'#161b22'},horzLines:{color:'#161b22'}},
  rightPriceScale:{borderColor:'#30363d',scaleMargins:{top:0.1,bottom:0.3}},
  timeScale:{borderColor:'#30363d',timeVisible:true,secondsVisible:false},
  crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
});

const candleSeries = chart.addCandlestickSeries({
  upColor:'#3fb950',downColor:'#f85149',borderVisible:false,
  wickUpColor:'#3fb950',wickDownColor:'#f85149',
});

const volumeSeries = chart.addHistogramSeries({
  priceFormat:{type:'volume'},priceScaleId:'volume',
});
chart.priceScale('volume').applyOptions({scaleMargins:{top:0.85,bottom:0}});

let currentTF = '5m';
let currentData = [];
let ws = null;

// --- Timeframe buttons ---
document.querySelectorAll('.tf-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTF = btn.dataset.tf;
    loadHistorical(currentTF);
  };
});

// --- Load historical data with timeframe ---
async function loadHistorical(tf) {
  const intervalMap = {'1m':'1','5m':'5','15m':'15','1h':'60','4h':'240','1d':'D'};
  const interval = intervalMap[tf] || '5';
  
  const api = `https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=${interval}&limit=500`;
  try {
    const r = await fetch(api);
    const data = await r.json();
    
    const candles = data.map(k => ({
      time: Math.floor(k[0] / 1000),
      open: parseFloat(k[1]),
      high: parseFloat(k[2]),
      low: parseFloat(k[3]),
      close: parseFloat(k[4]),
    }));
    
    const volumes = data.map(k => ({
      time: Math.floor(k[0] / 1000),
      value: parseFloat(k[5]),
      color: parseFloat(k[4]) >= parseFloat(k[1]) ? 'rgba(63,185,80,0.3)' : 'rgba(248,81,73,0.3)',
    }));
    
    candleSeries.setData(candles);
    volumeSeries.setData(volumes);
    chart.timeScale().fitContent();
    currentData = candles;
    
    // Update price
    const last = candles[candles.length - 1];
    updatePrice(last.close, last.open);
  } catch(e) {
    console.error('Historical load error:', e);
  }
}

// --- Update price display ---
function updatePrice(price, open) {
  document.getElementById('priceDisplay').textContent = '$' + Number(price).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
  const change = ((price - open) / open * 100);
  const el = document.getElementById('change');
  el.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
  el.className = change >= 0 ? 'green' : 'red';
}

// --- Futures data (every 30s) ---
async function loadFutures() {
  try {
    const [oiR, fundingR, lsR, tickerR] = await Promise.all([
      fetch('https://fapi.binance.com/fapi/v1/openInterest?symbol=BTCUSDT'),
      fetch('https://fapi.binance.com/fapi/v1/fundingRate?symbol=BTCUSDT&limit=1'),
      fetch('https://fapi.binance.com/futures/data/globalLongShortAccountRatio?symbol=BTCUSDT&period=1d'),
      fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT'),
    ]);
    
    const oi = await oiR.json();
    const funding = await fundingR.json();
    const ls = await lsR.json();
    const ticker = await tickerR.json();
    
    document.getElementById('oi').textContent = (parseFloat(oi.openInterest) / 1000).toFixed(1) + 'K';
    document.getElementById('funding').textContent = (parseFloat(funding[0]?.fundingRate || 0) * 100).toFixed(4) + '%';
    document.getElementById('ls').textContent = parseFloat(ls[0]?.longShortRatio || 1).toFixed(2);
    document.getElementById('high24h').textContent = '$' + parseFloat(ticker.highPrice).toLocaleString();
    document.getElementById('low24h').textContent = '$' + parseFloat(ticker.lowPrice).toLocaleString();
    document.getElementById('vol24h').textContent = (parseFloat(ticker.quoteVolume) / 1e9).toFixed(2) + 'B';
  } catch(e) {}
}

// --- WebSocket real-time ---
function connectWS() {
  if (ws) ws.close();
  ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
  
  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    const price = parseFloat(data.p);
    const qty = parseFloat(data.q);
    const time = Math.floor(data.T / 1000);
    
    // Update price
    updatePrice(price, currentData.length > 0 ? currentData[currentData.length - 1].open : price);
    
    // Real-time update to chart (update last candle)
    if (currentData.length > 0) {
      const last = currentData[currentData.length - 1];
      last.high = Math.max(last.high, price);
      last.low = Math.min(last.low, price);
      last.close = price;
      candleSeries.update(last);
    }
  };
  
  ws.onclose = () => { setTimeout(connectWS, 1000); };
  ws.onerror = () => { ws.close(); };
}

// --- Init ---
loadHistorical('5m');
loadFutures();
setInterval(loadFutures, 30000);
connectWS();

// Resize
window.addEventListener('resize', () => {
  chart.applyOptions({width: window.innerWidth, height: window.innerHeight - 110});
});
</script>
</body>
</html>
