<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BTC</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
body{margin:0;background:#0d1117;color:#c9d1d9;font-family:system-ui;overflow:hidden}
.h{background:#161b22;padding:5px 12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.h h2{color:#e94560;font-size:13px;margin:0}
#p{font-size:18px;font-weight:700}
.g{color:#3fb950}.r{color:#f85149}
.t{display:flex;gap:3px;margin-left:auto}
.t button{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:2px 8px;border-radius:3px;cursor:pointer;font-size:10px}
.t button.on{background:#1f6feb;border-color:#1f6feb;color:#fff}
#ct{width:100%;height:calc(100vh - 38px)}
</style>
</head>
<body>
<div class="h">
  <h2>🐉 BTC</h2>
  <span id="p">--</span>
  <span id="ch"></span>
  <div class="t">
    <button data-t="daily" class="on">Günlük</button>
    <button data-t="1h">1 saat</button>
    <button data-t="1m">1 dk</button>
  </div>
</div>
<div id="ct"></div>
<script>
var chart = LightweightCharts.createChart(document.getElementById('ct'),{
  layout:{textColor:'#8b949e',background:{color:'#0d1117'}},
  grid:{vertLines:{color:'#161b22'},horzLines:{color:'#161b22'}},
  timeScale:{borderColor:'#30363d',timeVisible:true,secondsVisible:false},
});
var series = chart.addCandlestickSeries({
  upColor:'#3fb950',downColor:'#f85149',borderVisible:false,
  wickUpColor:'#3fb950',wickDownColor:'#f85149',
});
var lastClose = 0;

function loadDaily(){
  fetch('data/btc_daily.json').then(function(r){return r.json();}).then(function(d){
    var data = d.map(function(c){return {time:c.time, open:c.open, high:c.high, low:c.low, close:c.close};});
    series.setData(data);
    chart.timeScale().fitContent();
    updatePrice(data);
  });
}

function loadHourly(){
  fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1h&limit=168').then(function(r){return r.json();}).then(function(k){
    var data = k.map(function(c){return {time:Math.floor(c[0]/1000), open:+c[1], high:+c[2], low:+c[3], close:+c[4]};});
    series.setData(data);
    chart.timeScale().fitContent();
    updatePrice(data);
  }).catch(function(){loadDaily();});
}

function loadMinute(){
  fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=120').then(function(r){return r.json();}).then(function(k){
    var data = k.map(function(c){return {time:Math.floor(c[0]/1000), open:+c[1], high:+c[2], low:+c[3], close:+c[4]};});
    series.setData(data);
    chart.timeScale().fitContent();
    updatePrice(data);
  }).catch(function(){loadDaily();});
}

function updatePrice(data){
  if(!data || !data.length) return;
  var last = data[data.length-1];
  var prev = data.length>1 ? data[data.length-2].close : last.close;
  var ch = (last.close - prev)/prev*100;
  document.getElementById('p').textContent = '$'+last.close.toLocaleString();
  document.getElementById('ch').textContent = (ch>0?'+':'')+ch.toFixed(2)+'%';
  document.getElementById('ch').className = ch>=0?'g':'r';
  lastClose = last.close;
}

// Timeframe buttons
document.querySelectorAll('.t button').forEach(function(b){
  b.onclick = function(){
    document.querySelectorAll('.t button').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');
    if(b.dataset.t==='daily') loadDaily();
    else if(b.dataset.t==='1h') loadHourly();
    else if(b.dataset.t==='1m') loadMinute();
  };
});

// WebSocket for live price
var ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
ws.onmessage = function(e){
  try{
    var d=JSON.parse(e.data), p=parseFloat(d.p);
    document.getElementById('p').textContent = '$'+p.toLocaleString();
    if(lastClose){
      var ch = (p-lastClose)/lastClose*100;
      document.getElementById('ch').textContent = (ch>0?'+':'')+ch.toFixed(2)+'%';
      document.getElementById('ch').className = ch>=0?'g':'r';
    }
  }catch(e2){}
};
ws.onclose = function(){setTimeout(function(){
  ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
},3000);};

window.onresize = function(){chart.applyOptions({width:window.innerWidth, height:window.innerHeight-38});};

// Start
loadDaily();
</script>
</body>
</html>
