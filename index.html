<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOVA | BTC/USDT</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
.header { 
  background: #16213e; padding: 12px 20px; 
  display: flex; align-items: center; gap: 15px;
  border-bottom: 1px solid #0f3460;
}
.header h1 { font-size: 18px; color: #e94560; }
.header .info { font-size: 13px; color: #888; }
#chart { width: 100%; height: calc(100vh - 50px); }
.loading {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  color: #666; font-size: 14px; z-index: 0;
}
</style>
</head>
<body>
<div class="header">
  <h1>🐉 HOVA | BTC/USDT</h1>
  <div class="info" id="priceInfo">Yükleniyor...</div>
</div>
<div id="chart"><div class="loading" id="loadingMsg">Veri yükleniyor...</div></div>

<script>
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
  layout: { textColor: '#888', background: { type: 'solid', color: '#1a1a2e' } },
  grid: { vertLines: { color: '#1a1a3e' }, horzLines: { color: '#1a1a3e' } },
  crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  rightPriceScale: { borderColor: '#0f3460' },
  timeScale: { borderColor: '#0f3460', timeVisible: false },
  width: window.innerWidth,
  height: window.innerHeight - 50,
});

const candleSeries = chart.addCandlestickSeries({
  upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
  wickUpColor: '#26a69a', wickDownColor: '#ef5350',
});

const volumeSeries = chart.addHistogramSeries({
  color: '#26a69a', priceFormat: { type: 'volume' }, priceScaleId: 'volume',
});
chart.priceScale('volume').applyOptions({
  scaleMargins: { top: 0.8, bottom: 0 },
});

fetch('data/btc_daily.json')
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(data => {
    document.getElementById('loadingMsg').style.display = 'none';
    
    const candles = [];
    const volumes = [];
    
    data.forEach(d => {
      const t = Math.floor(d.time);
      if (!t || isNaN(t)) return;
      candles.push({ time: t, open: d.open, high: d.high, low: d.low, close: d.close });
      volumes.push({ 
        time: t, 
        value: Math.round(d.volume),
        color: d.close >= d.open ? 'rgba(38,166,154,0.4)' : 'rgba(239,83,80,0.4)'
      });
    });
    
    candleSeries.setData(candles);
    volumeSeries.setData(volumes);
    
    const last = data[data.length - 1];
    const change = ((last.close - last.open) / last.open * 100).toFixed(2);
    document.getElementById('priceInfo').innerHTML = 
      `Son: <b style="color:${last.close >= last.open ? '#26a69a' : '#ef5350'}">$${Number(last.close).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</b> 
      | Gün: ${change}% 
      | Y: $${Number(last.high).toLocaleString()} 
      | D: $${Number(last.low).toLocaleString()}
      | Mum: ${data.length}`;
    
    chart.timeScale().fitContent();
  })
  .catch(err => {
    document.getElementById('loadingMsg').textContent = 'Hata: ' + err.message;
  });

window.addEventListener('resize', () => {
  chart.applyOptions({
    width: window.innerWidth,
    height: window.innerHeight - 50,
  });
});
</script>
</body>
</html>
