<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
body{margin:0;background:#0d1117;color:#c9d1d9;font-family:system-ui}
#chart{width:100%;height:100vh}
.h{background:#161b22;padding:5px 10px;display:flex;gap:10px;align-items:center}
.h h2{color:#e94560;font-size:14px;margin:0}
#price{font-size:18px;font-weight:700}
.green{color:#3fb950}.red{color:#f85149}
</style>
</head>
<body>
<div class="h">
  <h2>🐉 BTC/USDT</h2>
  <span id="price">Yükleniyor...</span>
  <span id="change"></span>
</div>
<div id="chart"></div>
<script>
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
  layout:{textColor:'#8b949e',background:{color:'#0d1117'}},
  grid:{vertLines:{color:'#161b22'},horzLines:{color:'#161b22'}},
  timeScale:{borderColor:'#30363d',timeVisible:true,secondsVisible:false,
    tickMarkFormatter: function(t){
      var d=new Date(t*1000);
      return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
    }
  },
});
const series = chart.addCandlestickSeries({
  upColor:'#3fb950',downColor:'#f85149',borderVisible:false,
  wickUpColor:'#3fb950',wickDownColor:'#f85149',
});

async function init(){
  try{
    // Strategy: load daily data first
    var r = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=365');
    var data = await r.json();
    var candles = data.map(function(k){
      return {
        time: Math.floor(k[0]/1000),
        open: parseFloat(k[1]),
        high: parseFloat(k[2]),
        low: parseFloat(k[3]),
        close: parseFloat(k[4])
      };
    });
    
    series.setData(candles);
    chart.timeScale().fitContent();
    
    var last = candles[candles.length-1];
    document.getElementById('price').textContent = '$'+last.close.toLocaleString();
    var ch = (last.close - candles[candles.length-2].close)/candles[candles.length-2].close*100;
    document.getElementById('change').textContent = (ch>0?'+':'')+ch.toFixed(2)+'%';
    document.getElementById('change').className = ch>=0?'green':'red';
    
    // Real-time via trade stream
    var ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
    ws.onmessage = function(e){
      try{
        var d = JSON.parse(e.data);
        var p = parseFloat(d.p);
        document.getElementById('price').textContent = '$'+p.toLocaleString();
        if(candles.length){
          var lc = candles[candles.length-1];
          lc.high = Math.max(lc.high, p);
          lc.low = Math.min(lc.low, p);
          lc.close = p;
          series.update(lc);
          var ch2 = (p - candles[0].close)/candles[0].close*100;
          document.getElementById('change').textContent = (ch2>0?'+':'')+ch2.toFixed(2)+'%';
          document.getElementById('change').className = ch2>=0?'green':'red';
        }
      }catch(e){}
    };
    ws.onclose = function(){ setTimeout(function(){ 
      ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade');
    }, 3000); };
  }catch(e){
    document.getElementById('price').textContent = 'Hata: '+e.message;
  }
}

init();
window.onresize = function(){
  chart.applyOptions({width:window.innerWidth, height:window.innerHeight-36});
};
</script>
</body>
</html>
