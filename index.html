<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">

</head>
<body>

<script>
var d=[{t:1774310400,o:70866,h:71377,l:68884,c:70523},{t:1774396800,o:70524,h:71999,l:70375,c:71297},{t:1774483200,o:71297,h:71408,l:68115,c:68788},{t:1774569600,o:68788,h:69142,l:65501,c:66364},{t:1774656000,o:66364,h:67284,l:65888,c:66334},{t:1774742400,o:66334,h:67100,l:64918,c:65977},{t:1782086400,o:63287,h:65597,l:63286,c:63990},{t:1782172800,o:63990,h:64247,l:61870,c:62696},{t:1782259200,o:62696,h:63209,l:59060,c:61051},{t:1782345600,o:61051,h:61931,l:58030,c:59771},{t:1782432000,o:59772,h:60734,l:58288,c:60072},{t:1782518400,o:60071,h:60924,l:59819,c:60000},{t:1782604800,o:60000,h:60543,l:58888,c:59550},{t:1782691200,o:59550,h:60758,l:58850,c:60224},{t:1782777600,o:60224,h:60250,l:58160,c:58605},{t:1784592000,o:65224,h:66924,l:65115,c:66522}];

var s=document.createElement('script');
s.src='https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js';
s.onload=function(){
  try{
    var c=LightweightCharts.createChart(document.getElementById('ct'),{layout:{background:{color:'#0d1117'}},timeScale:{timeVisible:true}});
    var cs=c.addCandlestickSeries({upColor:'#3fb950',downColor:'#f85149'});
    cs.setData(d.map(function(x){return{time:x.t,open:x.o,high:x.h,low:x.l,close:x.c};}));
    c.timeScale().fitContent();
    document.getElementById('p').textContent='BTC $'+d[d.length-1].c.toLocaleString();
  }catch(e){
    document.getElementById('p').textContent='Hata: '+e.message;
  }
};
s.onerror=function(){
  document.getElementById('p').textContent='Kutuphane yuklenemedi!';
};
document.head.appendChild(s);
</script>
</body>
</html>
